apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgadmin
  namespace: imexerp-prd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgadmin
  template:
    metadata:
      labels:
        app: pgadmin
    spec:
      containers:
      - name: pgadmin
        image: docker.io/dpage/pgadmin4:9.14
        ports:
        - containerPort: 80
        env:
        - name: PGADMIN_DEFAULT_EMAIL
          value: "support@imex.com"
        - name: PGADMIN_DEFAULT_PASSWORD
          value: "imexerpsupport"
        - name: SCRIPT_NAME
          value: "/pgadmin4"
        - name: PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION
          value: "False"
#        volumeMounts:
#        - name: pgadmin-data
#          mountPath: /var/lib/pgadmin
#      volumes:
#      - name: pgadmin-data
#        persistentVolumeClaim:
#          claimName: pgadmin-pvc